<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chatbot — Hemraj Adhikari</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --primary: #5b5ef4;
    --primary-dark: #4547d0;
    --user-bubble: #5b5ef4;
    --bot-bubble: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 4px 24px rgba(91,94,244,0.10);
    --radius: 18px;
    --radius-sm: 10px;
  }

  body.dark {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --bot-bubble: #242436;
    --text: #e8e8f0;
    --muted: #9ca3af;
    --border: #2e2e45;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, color 0.3s;
  }

  .app {
    width: 100%;
    max-width: 780px;
    height: 100vh;
    max-height: 860px;
    background: var(--surface);
    border-radius: 24px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #5b5ef4, #a855f7);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .online-dot {
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    box-shadow: 0 0 0 2px rgba(34,197,94,0.25);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.25); }
    50% { box-shadow: 0 0 0 5px rgba(34,197,94,0.10); }
  }

  .header-actions { display: flex; gap: 8px; }

  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--bg); }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, #5b5ef4, #a855f7);
    color: #fff;
  }

  .avatar.you {
    background: var(--primary);
    color: #fff;
  }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }
  .msg-row.user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.6;
    word-break: break-word;
  }

  .bubble.ai {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble.ai p { margin-bottom: 8px; }
  .bubble.ai p:last-child { margin-bottom: 0; }
  .bubble.ai ul, .bubble.ai ol { margin: 8px 0 8px 18px; }
  .bubble.ai li { margin-bottom: 4px; }
  .bubble.ai code {
    background: rgba(91,94,244,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'Courier New', monospace;
  }
  .bubble.ai pre {
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
  }
  .bubble.ai pre code { background: none; padding: 0; color: inherit; }

  .bubble-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    padding: 0 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--muted);
  }

  .copy-btn {
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .copy-btn:hover { background: var(--bg); color: var(--primary); }

  /* Typing */
  .typing-bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 18px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
  }
  .welcome-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }
  .welcome h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .welcome p { font-size: 14px; line-height: 1.6; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .suggestion-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }
  .suggestion-chip:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--primary); }

  #prompt {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    resize: none;
    outline: none;
    max-height: 130px;
    line-height: 1.5;
  }
  #prompt::placeholder { color: var(--muted); }

  .input-btns { display: flex; align-items: center; gap: 6px; }

  #voiceBtn {
    width: 34px; height: 34px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  #voiceBtn:hover { color: var(--primary); }

  #sendBtn {
    height: 36px;
    padding: 0 18px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: 'Inter', sans-serif;
  }
  #sendBtn:hover { background: var(--primary-dark); }
  #sendBtn:active { transform: scale(0.97); }
  #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  .input-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }

  /* Clear button */
  #clearBtn { color: #ef4444; }
  #clearBtn:hover { background: #fef2f2; border-color: #fca5a5; }

  @media (max-width: 600px) {
    .app { border-radius: 0; max-height: 100vh; }
    body { align-items: stretch; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🤖</div>
      <div>
        <div class="header-title">
          <span class="online-dot"></span>AI Assistant
        </div>
        <div class="header-sub">Powered by Claude · Built by Hemraj Adhikari</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="Toggle theme">🌙</button>
      <button class="icon-btn" id="exportBtn" title="Export chat">💾</button>
      <button class="icon-btn" id="clearBtn" title="Clear chat">🗑️</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">✨</div>
      <h2>How can I help you today?</h2>
      <p>I'm your AI assistant. Ask me anything — I remember our full conversation.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="useSuggestion(this)">Write an email</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Explain a concept</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Help me brainstorm</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Summarize text</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Fix my code</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Plan my day</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="prompt" placeholder="Ask anything…" rows="1"></textarea>
      <div class="input-btns">
        <button id="voiceBtn" title="Voice input">🎤</button>
        <button id="sendBtn">Send</button>
      </div>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>

</div>

<script>
// ── DOM ──────────────────────────────────────────────────────
const chat      = document.getElementById("chat");
const promptEl  = document.getElementById("prompt");
const sendBtn   = document.getElementById("sendBtn");
const themeBtn  = document.getElementById("themeBtn");
const exportBtn = document.getElementById("exportBtn");
const clearBtn  = document.getElementById("clearBtn");
const voiceBtn  = document.getElementById("voiceBtn");
const welcome   = document.getElementById("welcomeScreen");

// ── State ────────────────────────────────────────────────────
let history  = [];
let loading  = false;
let dark     = localStorage.getItem("theme") === "dark";

// ── Theme ────────────────────────────────────────────────────
function applyTheme() {
  document.body.classList.toggle("dark", dark);
  themeBtn.textContent = dark ? "☀️" : "🌙";
}
applyTheme();

themeBtn.addEventListener("click", () => {
  dark = !dark;
  localStorage.setItem("theme", dark ? "dark" : "light");
  applyTheme();
});

// ── Suggestions ──────────────────────────────────────────────
function useSuggestion(el) {
  promptEl.value = el.textContent;
  autoResize();
  promptEl.focus();
}

// ── Send ─────────────────────────────────────────────────────
async function sendMessage() {
  const text = promptEl.value.trim();
  if (!text || loading) return;

  if (welcome) welcome.style.display = "none";

  addUserBubble(text);
  promptEl.value = "";
  autoResize();
  await callClaude(text);
}

sendBtn.addEventListener("click", sendMessage);
promptEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
promptEl.addEventListener("input", autoResize);

function autoResize() {
  promptEl.style.height = "auto";
  promptEl.style.height = Math.min(promptEl.scrollHeight, 130) + "px";
}

// ── Claude API ───────────────────────────────────────────────
async function callClaude(userMsg) {
  loading = true;
  sendBtn.disabled = true;
  sendBtn.textContent = "…";
  showTyping();

  history.push({ role: "user", content: userMsg });

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1024,
        system: "You are a helpful, friendly AI productivity assistant. Format responses using markdown where helpful. Be concise but thorough.",
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || "No response.";
    history.push({ role: "assistant", content: reply });

    hideTyping();
    addBotBubble(reply);

  } catch (err) {
    hideTyping();
    addBotBubble(`⚠️ **Error:** ${err.message}`);
    history.pop();
  } finally {
    loading = false;
    sendBtn.disabled = false;
    sendBtn.textContent = "Send";
    promptEl.focus();
  }
}

// ── Render ───────────────────────────────────────────────────
function addUserBubble(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";

  const avatar = document.createElement("div");
  avatar.className = "avatar you";
  avatar.textContent = "You";

  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";

  const bubble = document.createElement("div");
  bubble.className = "bubble user";
  bubble.textContent = text;

  const meta = document.createElement("div");
  meta.className = "bubble-meta";
  meta.innerHTML = `<span class="msg-time">${formatTime()}</span>`;

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  row.appendChild(wrap);
  row.appendChild(avatar);
  chat.appendChild(row);
  scrollDown();
}

function addBotBubble(text) {
  const row = document.createElement("div");
  row.className = "msg-row";

  const avatar = document.createElement("div");
  avatar.className = "avatar ai";
  avatar.textContent = "AI";

  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";

  const bubble = document.createElement("div");
  bubble.className = "bubble ai";
  bubble.innerHTML = marked.parse(text);

  const copyBtn = document.createElement("button");
  copyBtn.className = "copy-btn";
  copyBtn.textContent = "Copy";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = "Copied!";
      setTimeout(() => copyBtn.textContent = "Copy", 1500);
    });
  };

  const meta = document.createElement("div");
  meta.className = "bubble-meta";
  meta.appendChild(copyBtn);
  const t = document.createElement("span");
  t.className = "msg-time";
  t.textContent = formatTime();
  meta.appendChild(t);

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  row.appendChild(avatar);
  row.appendChild(wrap);
  chat.appendChild(row);
  scrollDown();
}

// ── Typing ───────────────────────────────────────────────────
function showTyping() {
  removeTyping();
  const row = document.createElement("div");
  row.className = "msg-row";
  row.id = "typingRow";

  const avatar = document.createElement("div");
  avatar.className = "avatar ai";
  avatar.textContent = "AI";

  const bubble = document.createElement("div");
  bubble.className = "bubble ai typing-bubble";
  bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chat.appendChild(row);
  scrollDown();
}
function hideTyping() { removeTyping(); }
function removeTyping() { document.getElementById("typingRow")?.remove(); }

// ── Helpers ──────────────────────────────────────────────────
function scrollDown() { chat.scrollTop = chat.scrollHeight; }
function formatTime() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

// ── Export ───────────────────────────────────────────────────
exportBtn.addEventListener("click", () => {
  const lines = history.map(m =>
    `[${m.role === "user" ? "You" : "AI"}]: ${m.content}`
  ).join("\n\n");
  const blob = new Blob([`AI Assistant — Chat Export\n${new Date().toLocaleString()}\n${"─".repeat(50)}\n\n${lines}`], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `chat-${Date.now()}.txt`;
  a.click();
});

// ── Clear ────────────────────────────────────────────────────
clearBtn.addEventListener("click", () => {
  if (!confirm("Clear chat history?")) return;
  history = [];
  [...chat.querySelectorAll(".msg-row")].forEach(r => r.remove());
  if (welcome) welcome.style.display = "";
});

// ── Voice ────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR();
  rec.lang = "en-US";
  rec.onstart = () => { voiceBtn.textContent = "🔴"; };
  rec.onend   = () => { voiceBtn.textContent = "🎤"; };
  rec.onerror = () => { voiceBtn.textContent = "🎤"; };
  rec.onresult = (e) => {
    promptEl.value = e.results[0][0].transcript;
    autoResize();
    promptEl.focus();
  };
  voiceBtn.addEventListener("click", () => { try { rec.start(); } catch(e){} });
} else {
  voiceBtn.disabled = true;
  voiceBtn.style.opacity = "0.3";
}
</script>
</body>
</html>
